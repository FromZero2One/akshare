# 缓存配置文件

[cache]
# 缓存基础配置
enabled = true
expiry_days = 7
max_size_mb = 1024
cleanup_interval_days = 30

[data_cache]
# 数据缓存配置
cache_dir = ../../data/cache
compression = true
max_files = 10000

[result_cache]
# 结果缓存配置
cache_dir = ../../backtest_results/cache
enabled = true
max_results = 1000
expiry_hours = 24

[strategy_cache]
# 策略缓存配置
enabled = false
cache_dir = ../../cache/strategies
max_size_mb = 512