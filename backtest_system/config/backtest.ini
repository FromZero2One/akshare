# 回测系统配置文件

[backtest]
# 回测基础配置
initial_capital = 100000
commission_rate = 0.0005
default_adjust = qfq
default_strategy = SMACross

[data]
# 数据配置
cache_enabled = true
cache_expiry_days = 7
cache_dir = ../../data/cache
data_source = auto
max_workers = 4

# 数据库配置
db_enabled = true
db_save_enabled = true

[result]
# 结果配置
save_format = json
auto_save = true
summary_report = true
results_dir = ../../backtest_results
export_format = excel

[performance]
# 性能配置
max_workers = 4
batch_size = 50
memory_limit_mb = 2048

[logging]
# 日志配置
log_level = INFO
log_file = ../../data/logs/backtest.log
log_format = {asctime} - {name} - {levelname} - {message}

[strategies]
# 策略配置
enabled_strategies = SMACross, BollingerBands, MACD
load_from_directory = true
strategies_dir = ../strategies