# 策略参数配置文件

[SMACross]
# 双均线交叉策略
fast_ma = 7
slow_ma = 30
stop_loss = 0.05
take_profit = 0.15
max_position = 0.8
volume_filter = false
trend_filter = false

[SMACrossEnhanced]
# 增强双均线策略
fast_ma = 7
slow_ma = 30
stop_loss = 0.05
take_profit = 0.15
max_position = 0.8
volume_filter = true
trend_filter = true

[BollingerBands]
# 布林带策略
period = 20
std_dev = 2
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30

[MACD]
# MACD策略
fast_period = 12
slow_period = 26
signal_period = 9
rsi_period = 14
stop_loss = 0.05
take_profit = 0.15

[RSI]
# RSI策略
rsi_period = 14
rsi_overbought = 70
rsi_oversold = 30
ma_period = 20